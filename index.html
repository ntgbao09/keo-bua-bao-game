<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò chơi Kéo Búa Bao</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Kéo - Búa - Bao</h1>
        
        <div class="choices">
            <button onclick="playGame('keo')">✌️ Kéo</button>
            <button onclick="playGame('bua')">✊ Búa</button>
            <button onclick="playGame('bao')">✋ Bao</button>
        </div>

        <div class="result-display">
            <p id="user-choice">Bạn chọn: -</p>
            <p id="computer-choice">Máy chọn: -</p>
            <h2 id="winner-text">Bắt đầu chơi nào!</h2>
        </div>

        <div class="score">
            <p>Điểm của bạn: <span id="user-score">0</span></p>
            <p>Điểm của máy: <span id="computer-score">0</span></p>
        </div>
        <button onclick="resetGame()" style="margin-top: 20px; background-color: #6c757d;">Chơi lại từ đầu</button>

    <div id="player-image-container" class="side-image-container left-side">
        <img id="player-keo" src="assets/player_keo.png" alt="Bàn tay kéo của bạn" class="hand-image">
        <img id="player-bua" src="assets/player_bua.png" alt="Bàn tay búa của bạn" class="hand-image">
        <img id="player-bao" src="assets/player_bao.png" alt="Bàn tay bao của bạn" class="hand-image">
    </div>

    <div id="computer-image-container" class="side-image-container right-side">
        <img id="computer-keo" src="assets/computer_keo.png" alt="Bàn tay kéo của máy" class="hand-image">
        <img id="computer-bua" src="assets/computer_bua.png" alt="Bàn tay búa của máy" class="hand-image">
        <img id="computer-bao" src="assets/computer_bao.png" alt="Bàn tay bao của máy" class="hand-image">
    </div>

    <div class="game-container">
    
    </div>

    <script src="script.js"></script>
</body>
</html>
